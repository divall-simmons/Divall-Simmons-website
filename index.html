<!DOCTYPE html>
<html>
<head>

<title>Divall Simmons Antiques</title>

<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Divall Simmons antiques, vintage, retro gifts and collectables">

<style>

body{
background:#050505;
color:white;
font-family:Arial, Helvetica, sans-serif;
margin:0;
text-align:center;
}

header{
padding:50px 20px;
}

.logo{
max-width:360px;
}

.tagline{
color:#d4af37;
font-size:28px;
margin-top:20px;
letter-spacing:1px;
}

.section{
padding:60px 20px;
}

h2{
color:#d4af37;
margin-bottom:25px;
}

.offer img{
max-width:500px;
width:90%;
border-radius:10px;
box-shadow:0 0 15px rgba(0,0,0,0.7);
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:40px;
}

.gallery img{
width:100%;
border-radius:10px;
transition:transform .3s ease;
}

.gallery img:hover{
transform:scale(1.05);
}

.contact{
max-width:500px;
margin:auto;
}

form{
display:flex;
flex-direction:column;
gap:12px;
}

input, textarea{
padding:12px;
border-radius:6px;
border:none;
}

button{
padding:14px;
background:#d4af37;
border:none;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#b9972f;
}

.social{
margin-top:40px;
}

.social a{
color:#d4af37;
margin:0 15px;
text-decoration:none;
font-size:18px;
}

.map{
margin-top:40px;
}

footer{
margin-top:60px;
padding:30px;
font-size:14px;
color:#aaa;
border-top:1px solid #333;
}

</style>

</head>

<body>

<header>

<img src="divall-simmons-logo.jpg" class="logo">

<div class="tagline">
Antiques • Vintage • Retro • Gifts & Collectables
</div>

</header>

<div class="section offer">

<h2>Offer of the Week</h2>

<img src="offer.jpg">

</div>

<div class="gallery">

<img src="gallery1.jpg">
<img src="gallery2.jpg">
<img src="gallery3.jpg">
<img src="gallery4.jpg">
<img src="gallery5.jpg">
<img src="gallery6.jpg">

</div>

<div class="section contact">

<h2>Contact Us</h2>

<p>Email: <a href="mailto:info@divall-simmons.com" style="color:#d4af37;">info@divall-simmons.com</a></p>

<form action="https://formspree.io/f/mnqedzvp" method="POST">

<input type="text" name="name" placeholder="Your Name" required>

<input type="email" name="email" placeholder="Your Email" required>

<textarea name="message" placeholder="Message" required></textarea>

<button type="submit">Send Enquiry</button>

</form>

<div class="social">

<h3>Follow Us</h3>

<a href="#">Facebook</a>
<a href="#">Instagram</a>
<a href="#">eBay</a>

</div>

<div class="map">

<h3>Find Us</h3>

<iframe
width="100%"
height="300"
style="border:0"
loading="lazy"
allowfullscreen
src="https://www.google.com/maps?q=United+Kingdom&output=embed">
</iframe>

</div>

</div>

<footer>

© Divall Simmons Antiques

</footer>

</body>
</html>
