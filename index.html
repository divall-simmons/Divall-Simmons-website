<!DOCTYPE html>
<html>
<head>
<title>Divall Simmons</title>

<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Divall Simmons antiques, vintage, retro gifts and collectables">

<style>

body{
background:black;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

header{
padding:40px;
}

.logo{
max-width:350px;
}

.tagline{
color:#e3b341;
font-size:28px;
margin-top:20px;
}

.section{
padding:50px 20px;
}

.offer img{
max-width:500px;
width:90%;
border-radius:8px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:40px;
}

.gallery img{
width:100%;
border-radius:8px;
}

form{
max-width:500px;
margin:auto;
display:flex;
flex-direction:column;
gap:10px;
}

input, textarea{
padding:10px;
border-radius:5px;
border:none;
}

button{
padding:12px;
background:#e3b341;
border:none;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#c99b2e;
}

</style>
</head>

<body>

<header>

<img src="divall-simmons-logo.jpg" class="logo">

<div class="tagline">
Antiques • Vintage • Retro • Gifts & Collectables
</div>

</header>

<div class="section offer">

<h2>Offer of the Week</h2>

<img src="offer.jpg">

</div>

<div class="gallery">

<img src="gallery1.jpg">
<img src="gallery2.jpg">
<img src="gallery3.jpg">
<img src="gallery4.jpg">
<img src="gallery5.jpg">
<img src="gallery6.jpg">

</div>

<div class="section">

<h2>Contact Us</h2>

<p>Drop us a line!</p>

<form action="https://formspree.io/f/mnqedzvp" method="POST">

<input type="text" name="name" placeholder="Your Name" required>

<input type="email" name="email" placeholder="Your Email" required>

<textarea name="message" placeholder="Message" required></textarea>

<button type="submit">Send Enquiry</button>

</form>

</div>

</body>
</html>
