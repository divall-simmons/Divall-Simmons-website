<!DOCTYPE html>
<html>

<head>

<title>Divall Simmons Antiques | Vintage | Retro | Collectables</title>

<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Divall Simmons antiques, vintage, retro gifts and collectables based in Wrexham, UK.">

<meta property="og:title" content="Divall Simmons Antiques">
<meta property="og:description" content="Antiques • Vintage • Retro • Gifts & Collectables">
<meta property="og:type" content="website">

<style>

html{
scroll-behavior:smooth;
}

body{
background:#050505;
color:white;
font-family:Arial, Helvetica, sans-serif;
margin:0;
text-align:center;
}

/* NAV */

nav{
background:black;
padding:15px;
position:sticky;
top:0;
z-index:1000;
border-bottom:1px solid #222;
}

nav a{
color:#d4af37;
margin:0 20px;
text-decoration:none;
font-weight:bold;
}

nav a:hover{
text-decoration:underline;
}

/* HEADER */

header{
padding:50px 20px;
}

.logo{
max-width:360px;
}

.tagline{
color:#d4af37;
font-size:28px;
margin-top:20px;
}

/* SECTIONS */

.section{
padding:60px 20px;
}

h2{
color:#d4af37;
}

/* OFFER */

.offer img{
max-width:500px;
width:90%;
border-radius:10px;
}

/* GALLERY */

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:40px;
}

.gallery img{
width:100%;
border-radius:10px;
cursor:pointer;
transition:transform .3s ease;
}

.gallery img:hover{
transform:scale(1.05);
}

/* ZOOM MODAL */

.modal{
display:none;
position:fixed;
z-index:2000;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
}

.modal img{
max-width:90%;
max-height:90%;
margin-top:5%;
}

/* CONTACT */

.contact{
max-width:500px;
margin:auto;
}

form{
display:flex;
flex-direction:column;
gap:12px;
}

input, textarea{
padding:12px;
border-radius:6px;
border:none;
}

button{
padding:14px;
background:#d4af37;
border:none;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#b9972f;
}

/* SOCIAL */

.social{
margin-top:40px;
}

.social a{
color:#d4af37;
margin:0 15px;
text-decoration:none;
}

/* FOOTER */

footer{
margin-top:60px;
padding:30px;
font-size:14px;
color:#aaa;
border-top:1px solid #333;
}

</style>

</head>

<body>

<nav>

<a href="#home">Home</a>
<a href="#offer">Offer</a>
<a href="#gallery">Gallery</a>
<a href="#contact">Contact</a>
<a href="#map">Find Us</a>

</nav>

<header id="home">

<img src="divall-simmons-logo.jpg" class="logo" loading="lazy">

<div class="tagline">
Antiques • Vintage • Retro • Gifts & Collectables
</div>

</header>

<div class="section offer" id="offer">

<h2>Offer of the Week</h2>

<img src="offer.jpg" loading="lazy">

</div>

<div class="gallery" id="gallery">

<img src="gallery1.jpg" loading="lazy" onclick="openModal(this)">
<img src="gallery2.jpg" loading="lazy" onclick="openModal(this)">
<img src="gallery3.jpg" loading="lazy" onclick="openModal(this)">
<img src="gallery4.jpg" loading="lazy" onclick="openModal(this)">
<img src="gallery5.jpg" loading="lazy" onclick="openModal(this)">
<img src="gallery6.jpg" loading="lazy" onclick="openModal(this)">

</div>

<!-- ZOOM WINDOW -->

<div id="imgModal" class="modal" onclick="closeModal()">
<img id="modalImg">
</div>

<div class="section contact" id="contact">

<h2>Contact Us</h2>

<p>Email: <a href="mailto:info@divall-simmons.com" style="color:#d4af37;">info@divall-simmons.com</a></p>

<form action="https://formspree.io/f/mnqedzvp" method="POST">

<input type="text" name="name" placeholder="Your Name" required>
<input type="email" name="email" placeholder="Your Email" required>

<textarea name="message" placeholder="Message" required></textarea>

<button type="submit">Send Enquiry</button>

</form>

<div class="social">

<h3>Follow Us</h3>

<a href="#">Facebook</a>
<a href="#">Instagram</a>
<a href="#">eBay</a>

</div>

<div class="map" id="map">

<h3>Find Us</h3>

<iframe
width="100%"
height="300"
style="border:0"
loading="lazy"
allowfullscreen
src="https://www.google.com/maps?q=LL14+1RE&output=embed">
</iframe>

</div>

</div>

<footer>

© Divall Simmons Antiques

</footer>

<script>

function openModal(img){
document.getElementById("imgModal").style.display="block";
document.getElementById("modalImg").src=img.src;
}

function closeModal(){
document.getElementById("imgModal").style.display="none";
}

</script>
