<!DOCTYPE html>
<html>

<head>

<title>Divall Simmons Antiques</title>

<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Divall Simmons antiques, vintage, retro gifts and collectables">

<style>

html{
scroll-behavior:smooth;
}

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
color:white;
text-align:center;

/* Dark wood texture */
background:
linear-gradient(rgba(0,0,0,.85),rgba(0,0,0,.9)),
url("https://www.transparenttextures.com/patterns/wood-pattern.png");
}

/* NAV BAR */

nav{
background:black;
padding:15px;
position:sticky;
top:0;
z-index:1000;
border-bottom:2px solid #d4af37;
}

nav a{
color:#d4af37;
margin:0 20px;
text-decoration:none;
font-weight:bold;
}

nav a:hover{
text-shadow:0 0 10px #d4af37;
}

/* HEADER */

header{
padding:50px 20px;
}

.logo{
max-width:360px;
}

.tagline{
color:#d4af37;
font-size:26px;
margin-top:20px;
}

/* CATEGORY CARDS */

.categories{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
padding:40px;
max-width:1100px;
margin:auto;
}

.card{
background:#111;
padding:10px;
border-radius:8px;
box-shadow:0 0 20px rgba(0,0,0,.8);
transition:.3s;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 20px #d4af37;
}

.card img{
width:100%;
border-radius:6px;
}

/* OFFER */

.offer img{
max-width:500px;
width:90%;
border-radius:10px;
margin-top:20px;
}

/* FOOTER */

footer{
margin-top:60px;
padding:30px;
font-size:14px;
color:#aaa;
border-top:1px solid #333;
}

</style>

</head>

<body>

<nav>

<a href="#home">Home</a>
<a href="#offer">Offer</a>
<a href="#categories">Collections</a>

</nav>

<header id="home">

<img src="divall-simmons-logo.jpg" class="logo">

<div class="tagline">
Antiques • Vintage • Retro • Gifts & Collectables
</div>

</header>

<section id="offer">

<h2 style="color:#d4af37;">Offer of the Week</h2>

<img src="offer.jpg">

</section>

<section id="categories">

<h2 style="color:#d4af37;">Collections</h2>

<div class="categories">

<a href="jewellery.html" class="card">
<img src="gallery1.jpg">
</a>

<a href="watches.html" class="card">
<img src="gallery2.jpg">
</a>

<a href="ornamental.html" class="card">
<img src="gallery3.jpg">
</a>

<a href="furniture.html" class="card">
<img src="gallery4.jpg">
</a>

<a href="brass.html" class="card">
<img src="gallery5.jpg">
</a>

<a href="art.html" class="card">
<img src="gallery6.jpg">
</a>

</div>

</section>

<footer>

© Divall Simmons Antiques

</footer>

</body>
</html>
