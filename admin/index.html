<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Divall Simmons Admin</title>

  <!-- Netlify Identity -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

  <!-- Decap CMS -->
  <script src="https://unpkg.com/decap-cms@latest/dist/decap-cms.js"></script>
</head>

<body>

  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
          });
        }
      });
    }

    CMS.init({
      config: {
        backend: {
          name: "git-gateway",
          branch: "main"
        },
        media_folder: "images/uploads",
        public_folder: "/images/uploads",
        collections: [
          {
            name: "products",
            label: "Products",
            folder: "products",
            create: true,
            slug: "{{slug}}",
            fields: [
              { label: "Title", name: "title", widget: "string" },
              { label: "Price", name: "price", widget: "string" },
              { label: "Category", name: "category", widget: "select", options: ["Jewellery", "Watches", "Ornamental", "Furniture", "Brass", "Art"] },
              { label: "Condition", name: "condition", widget: "string" },
              { label: "Approx Age", name: "age", widget: "string" },
              { label: "Size", name: "size", widget: "string" },
              { label: "Description", name: "body", widget: "text" },
              { label: "Image", name: "image", widget: "image" }
            ]
          }
        ]
      }
    });
  </script>

</body>
</html>
